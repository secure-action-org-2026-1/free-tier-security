version: 2

updates:
  # Keep GitHub Actions pinned SHA hashes up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"
    # Open grouped PRs, not one per action
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    # Require manual review — don't auto-merge
    open-pull-requests-limit: 5
