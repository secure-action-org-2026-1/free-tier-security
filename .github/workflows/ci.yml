# Hardened CI — Example of a secure GitHub Actions workflow
#
# Demonstrates CICD-SEC-04 (Poisoned Pipeline Execution) defenses:
#
#   ✓ Minimal permissions at workflow + job level
#   ✓ Actions pinned to full commit SHA (not tags or branches)
#   ✓ No script injection — user-controlled data passed via env:, never ${{ }} in run:
#   ✓ Trigger: pull_request (not pull_request_target) — no elevated permissions for forks
#   ✓ persist-credentials: false — git creds removed after checkout
#   ✓ No secrets: inherit — secrets named explicitly
#   ✓ GitHub-hosted runner (ubuntu-latest) — ephemeral, clean per job
#
# Adapt this template for your own build/test/release workflows.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Default: deny everything. Each job grants only what it needs.
permissions: {}

jobs:
  # ── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read     # checkout

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # SAFE pattern: pass github context values via env:, NOT directly in run:
      # BAD (vulnerable to script injection):
      #   run: echo "PR title: ${{ github.event.pull_request.title }}"
      # GOOD:
      - name: Echo PR metadata (safe injection demo)
        if: github.event_name == 'pull_request'
        run: |
          echo "PR number: $PR_NUMBER"
          echo "PR title:  $PR_TITLE"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: Run tests (placeholder)
        run: |
          echo "Replace this step with your actual test command"
          echo "e.g.: python -m pytest, npm test, go test ./..."

  # ── Security gate ─────────────────────────────────────────────────────────────
  # Blocks merging if zizmor finds issues in workflow files being changed.
  # Add "zizmor" as a required status check in branch protection settings.
  security-gate:
    name: Security gate
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - name: All checks passed
        run: echo "Build and security checks passed."
