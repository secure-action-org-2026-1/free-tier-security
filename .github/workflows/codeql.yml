# CodeQL — Free static analysis for public repos (GitHub Code Security not required)
# Languages: add/remove from the matrix as needed.
# Results appear in Repo → Security → Code scanning.
#
# This demonstrates GitHub's native SAST, complementing zizmor (workflow-specific SAST).

name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '15 2 * * 3'    # Weekly: Wednesday 02:15 UTC

permissions: {}

jobs:
  # Scan GitHub Actions workflow files — always present in this repo.
  # For application code (Python, JS, Go, etc.), add a second matrix entry once
  # source code exists. CodeQL exits 32 ("no source found") if the language is
  # specified but no matching files exist, so we gate each entry with hashFiles.
  analyze:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub Actions workflow SAST (always present)
          - language: actions
            files_glob: '.github/workflows/**'
          # Python — only run if .py files exist in the repo
          # - language: python
          #   files_glob: '**/*.py'
          # JavaScript/TypeScript — uncomment when needed
          # - language: javascript-typescript
          #   files_glob: '**/*.{js,ts,jsx,tsx}'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          languages: ${{ matrix.language }}
          # queries: security-extended   # broader coverage, more false positives

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          category: codeql-${{ matrix.language }}
