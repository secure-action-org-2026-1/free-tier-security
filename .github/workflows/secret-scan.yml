# Gitleaks — Secret scanning for every push and pull request
# Covers: credential leakage (part of CICD-SEC-04 / supply chain hardening)
# Detects 160+ secret types: API keys, tokens, private keys, connection strings.
#
# On public repos this complements GitHub's built-in secret scanning.
# On private repos this is the free alternative to GitHub Secret Protection.
#
# Full-history scan on push (fetch-depth: 0), delta scan on PR.

name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # pull-requests: read  # uncomment to enable inline PR comments
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0            # full history — detects secrets in any commit
          persist-credentials: false

      - name: Install Gitleaks
        # Use the gitleaks CLI binary directly — the gitleaks-action wrapper requires
        # a paid license for org repos. The CLI itself is Apache 2.0 / free.
        run: |
          GITLEAKS_VERSION="8.27.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        # Exit code 1 = secrets found (fails the job → blocks merge via required check)
        # Exit code 0 = clean
        run: |
          gitleaks detect \
            --source . \
            --verbose \
            --redact \
            --exit-code 1
