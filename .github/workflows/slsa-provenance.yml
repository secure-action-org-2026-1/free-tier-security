# SLSA Provenance — Generate SLSA Level 3 provenance for release artifacts
#
# Uses the SLSA GitHub Generator (reusable workflow) with Sigstore keyless signing.
# Provenance is verifiable with `slsa-verifier` independently of GitHub infrastructure.
# Free on all GitHub plans — no GitHub Enterprise Cloud required.
#
# Trigger: push a semver tag, e.g.:  git tag v1.0.0 && git push --tags
#
# The provenance attestation (.intoto.jsonl) is uploaded alongside the release artifact.

name: slsa-provenance

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver tags only, e.g. v1.2.3

# id-token: write must be at workflow level (not just job level) for OIDC
# when calling external reusable workflows (GitHub Actions requirement).
permissions:
  id-token: write    # SLSA generator Sigstore keyless signing
  contents: write    # upload provenance to release
  actions: read      # read workflow run info

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────────
  # Replace this with your actual build. The job must output:
  #   - artifact file(s)
  #   - base64-encoded SHA-256 hashes of those files
  build:
    name: Build artifact
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Build (placeholder — replace with your real build)
        run: |
          # Example: produce a release tarball
          tar czf artifact.tar.gz README.md .github/

      - name: Compute SHA-256 hashes
        id: hash
        run: |
          # Output format required by slsa-github-generator:
          # base64( "<sha256>  <filename>\n<sha256>  <filename2>\n..." )
          HASHES=$(sha256sum artifact.tar.gz | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: artifact
          path: artifact.tar.gz
          if-no-files-found: error
          retention-days: 1

  # ── Provenance ────────────────────────────────────────────────────────────────
  # SLSA Level 3: non-falsifiable, signed provenance generated by isolated workflow.
  # The generator runs in a separate job with OIDC — the build job cannot tamper with it.
  provenance:
    name: Generate SLSA provenance
    needs: [build]
    permissions:
      id-token: write      # Sigstore keyless signing
      contents: write      # upload provenance to release
      actions: read        # read workflow run info
    # Pin by SHA — tags can be moved; SHA is immutable.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a  # v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true     # attach .intoto.jsonl to the GitHub release

  # ── Verify locally ─────────────────────────────────────────────────────────────
  # After release, verify with:
  #   slsa-verifier verify-artifact artifact.tar.gz \
  #     --provenance-path artifact.tar.gz.intoto.jsonl \
  #     --source-uri github.com/secure-action-org-2026-1/free-tier-security \
  #     --source-tag v1.0.0
