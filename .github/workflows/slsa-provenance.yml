# Artifact Provenance — SLSA-compliant signed attestation for release artifacts
#
# Uses GitHub's native actions/attest-build-provenance (step-level action).
# Generates a Sigstore-signed SLSA provenance attestation stored in the repo's
# attestations registry — no external reusable workflow call required.
#
# Verify after release:
#   gh attestation verify artifact.tar.gz \
#     --owner secure-action-org-2026-1
#
# Trigger: push a semver tag, e.g.:  git tag v1.0.0 && git push --tags

name: slsa-provenance

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

jobs:
  build-and-attest:
    name: Build and attest artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write     # create GitHub release + upload artifact
      id-token: write     # Sigstore OIDC keyless signing
      attestations: write # write provenance attestation to repo

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Build artifact
        run: tar czf artifact.tar.gz README.md .github/

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        id: attest
        with:
          subject-path: artifact.tar.gz

      - name: Create GitHub release with artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" artifact.tar.gz \
            --title "$TAG" \
            --notes "Artifact with SLSA provenance attestation.

Verify with:
  gh attestation verify artifact.tar.gz --owner secure-action-org-2026-1"

