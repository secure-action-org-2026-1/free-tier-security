# SLSA Provenance - Generate SLSA Level 3 provenance for release artifacts
# Uses the SLSA GitHub Generator with Sigstore keyless signing.
# Trigger: push a semver tag, e.g.:  git tag v1.0.0 && git push --tags

name: slsa-provenance

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# id-token: write must be at workflow level for OIDC when calling external reusable workflows
permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  build:
    name: Build artifact
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Build
        run: |
          tar czf artifact.tar.gz README.md .github/

      - name: Compute SHA-256 hashes
        id: hash
        run: |
          HASHES=$(sha256sum artifact.tar.gz | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: artifact
          path: artifact.tar.gz
          if-no-files-found: error
          retention-days: 1

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

