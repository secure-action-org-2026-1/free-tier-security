# Zizmor — Static analysis for GitHub Actions workflow files
# Detects: script injection, pull_request_target + fork checkout, unpinned actions,
# missing permissions, dangerous use of GITHUB_ENV / GITHUB_PATH (CICD-SEC-04 coverage)
#
# Results appear in Repo → Security → Code scanning (SARIF upload)
# Free on public repos: no GitHub Code Security license required.

name: zizmor

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

# Minimal permissions — only what each job needs
permissions: {}

jobs:
  zizmor:
    name: Workflow SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Install zizmor
        # zizmor is a Rust binary distributed as a Python wheel on PyPI.
        # pip install is reliable on ubuntu-latest (Python 3.x included).
        run: pip install zizmor

      - name: Run zizmor (SARIF)
        # Exit codes: 0 = no findings, 1 = findings, 2 = fatal error
        # Redirect stdout (SARIF) to file; suppress progress output on stderr.
        # Validate JSON after run — create empty valid SARIF on error/empty output.
        run: |
          zizmor \
            --gh-token "${{ secrets.GITHUB_TOKEN }}" \
            --format sarif \
            . > zizmor-results.sarif 2>/dev/null || true
          python3 -c "import json,sys; json.load(open('zizmor-results.sarif'))" 2>/dev/null || \
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"zizmor","rules":[]}},"results":[]}]}' > zizmor-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3
        if: always()
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor
