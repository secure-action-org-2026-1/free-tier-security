# Zizmor — Static analysis for GitHub Actions workflow files
# Detects: script injection, pull_request_target + fork checkout, unpinned actions,
# missing permissions, dangerous use of GITHUB_ENV / GITHUB_PATH (CICD-SEC-04 coverage)
#
# Results appear in Repo → Security → Code scanning (SARIF upload)
# Free on public repos: no GitHub Code Security license required.

name: zizmor

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

# Minimal permissions — only what each job needs
permissions: {}

jobs:
  zizmor:
    name: Workflow SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install zizmor
        # zizmor is a Rust binary distributed as a Python wheel on PyPI.
        # pip install is reliable on ubuntu-latest (Python 3.x included).
        run: pip install zizmor

      - name: Run zizmor (SARIF)
        # NOTE: --format sarif forces exit 0 (SARIF is for downstream upload, not CI pass/fail).
        # Fix: run zizmor twice — once without SARIF to capture the real exit code,
        # then once with --format sarif --no-exit-codes to generate the SARIF artifact.
        run: |
          set +e
          zizmor \
            --gh-token "${{ secrets.GITHUB_TOKEN }}" \
            . 2>&1
          ZIZMOR_EXIT=$?
          set -e
          zizmor \
            --gh-token "${{ secrets.GITHUB_TOKEN }}" \
            --format sarif \
            --no-exit-codes \
            . > zizmor-results.sarif 2>/dev/null || true
          python3 -c "import json; json.load(open('zizmor-results.sarif'))" 2>/dev/null || \
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"zizmor","rules":[]}},"results":[]}]}' > zizmor-results.sarif
          exit $ZIZMOR_EXIT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        if: always()
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor
